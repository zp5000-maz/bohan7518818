<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>博瀚文理 - 考勤系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f4f8; margin: 0; padding: 15px; }
    #video-box { width: 100%; max-width: 360px; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    video { width: 100%; transform: scaleX(-1); display: block; }
    #status { margin-top: 15px; padding: 12px; font-weight: bold; text-align: center; background: #fff; border-radius: 30px; width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 1rem; }
    #btn-group { display: none; margin-top: 20px; gap: 20px; }
    .btn { padding: 15px 40px; border: none; border-radius: 12px; font-size: 1.3rem; font-weight: bold; color: #fff; cursor: pointer; transition: 0.2s; }
    .btn-on { background: #28a745; }
    .btn-off { background: #dc3545; }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <h3 style="color: #1a73e8; margin-bottom: 10px;">博瀚文理打卡機</h3>
  <div id="video-box"><video id="video" autoplay muted playsinline></video></div>
  <div id="status">系統初始化中...</div>
  <div id="btn-group">
    <button class="btn btn-on" onclick="handlePunch('上班')">上班</button>
    <button class="btn btn-off" onclick="handlePunch('下班')">下班</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const btnGroup = document.getElementById('btn-group');
    
    // --- 請確保此網址正確且已設定為「所有人」皆可存取 ---
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzCWc_RXUpHw5iQvKdJtDeVIk-2nWtY10I5GBz0sVYeegVQDPKp04YDf7MzUCl4JYfyCg/exec'; 
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    
    let faceMatcher = null, currentTeacher = "", isBusy = false;

    async function init() {
      try {
        status.innerText = '1/3 載入辨識模型...';
        await faceapi.nets.tinyFaceDetector.load(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.load(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.load(MODEL_URL);
        
        status.innerText = '2/3 讀取老師名單...';
        const res = await fetch(GAS_URL);
        const data = await res.json();
        
        if (!data || data.length === 0) {
          throw new Error('名單是空的，請先完成人臉註冊');
        }

        const labeled = data.map(m => new faceapi.LabeledFaceDescriptors(m.name, [new Float32Array(m.descriptor)]));
        faceMatcher = new faceapi.FaceMatcher(labeled, 0.55); // 0.55 兼顧準確與速度
        
        status.innerText = '3/3 啟動攝影機...';
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 320, height: 240, facingMode: "user" } 
        });
        video.srcObject = stream;
        
        status.innerText = '請對準臉部進行辨識';
        detect();
      } catch (e) { 
        status.style.color = "red";
        status.innerText = '啟動失敗：' + e.message;
        console.error(e);
      }
    }

    async function detect() {
      if (isBusy) return;
      
      // 使用 TinyFaceDetector 搭配較小的 inputSize 以加速 iPhone 7 運算
      const dec = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 128 }))
                                    .withFaceLandmarks()
                                    .withFaceDescriptor();
      
      if (dec && faceMatcher) {
        const match = faceMatcher.findBestMatch(dec.descriptor);
        if (match.label !== 'unknown') {
          currentTeacher = match.label;
          status.innerText = '老師：' + currentTeacher + '，請打卡';
          status.style.color = "#1a73e8";
          btnGroup.style.display = 'flex';
          isBusy = true;
          return;
        }
      }
      // 每 400 毫秒偵測一次，預防手機過熱
      setTimeout(detect, 400); 
    }

    async function handlePunch(type) {
      status.innerText = '正在傳送紀錄...';
      status.style.color = "black";
      btnGroup.style.display = 'none';
      
      try {
        const res = await fetch(GAS_URL, { 
          method: 'POST', 
          body: JSON.stringify({ action: "checkin", name: currentTeacher, type: type }) 
        });
        const result = await res.json();
        
        if (result.status === "success") {
          status.innerText = result.message;
          status.style.color = "green";
        } else {
          status.innerText = result.message;
          status.style.color = "red";
        }
      } catch (e) { 
        status.innerText = '連線失敗，請檢查網路';
        status.style.color = "red";
      }
      
      // 5 秒後重置畫面
      setTimeout(() => { 
        status.style.color = "black"; 
        status.innerText = '請對準臉部進行辨識'; 
        isBusy = false; 
        detect(); 
      }, 5000);
    }

    // 初始化系統
    init();
  </script>
</body>
</html>

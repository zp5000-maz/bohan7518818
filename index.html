<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚AI辨識系統 - 穩定版</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 60vh; background: #111; }
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { padding: 15px; background: #000; height: 40vh; box-sizing: border-box; }
        .btn { padding: 18px 0; font-size: 22px; border-radius: 12px; border: none; margin: 8px 1%; font-weight: bold; width: 45%; }
        .on { background: #2E7D32; color: white; }
        .off { background: #C62828; color: white; }
        .reg { background: #333; color: #bbb; width: 93%; margin-top: 10px; font-size: 14px; border: 1px solid #444; }
        #status { font-size: 18px; color: #FFFFFF; padding: 12px; background: #222; min-height: 30px; font-weight: bold; }
        .loading-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="status">博瀚 AI辨識初始化...</div>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <div class="ui">
        <button class="btn on" onclick="handleAction('上班')">上班打卡</button>
        <button class="btn off" onclick="handleAction('下班')">下班打卡</button>
        <button class="btn reg" onclick="startRegister()">管理模式 (快速註冊)</button>
    </div>
    <div id="mask" class="loading-mask">
        <div style="font-size: 20px; font-weight: bold;">處理中...</div>
    </div>

    <script>
        const API_URL = "
https://script.google.com/macros/s/AKfycbzvLPrTwyu0Z4v7aBp2A7VAjRYr3oCeiJEnN9vyibUGhXczqceY-fgVQ2aY2pTw-QM5qA/exec"; 
        const SCHOOL_LOC = { lat: 22.60600592058107, lng: 120.33630488747696 }; 
        
        let faceMatcher = null; 
        let isEngineReady = false;
        let currentDetectedName = "未知";
        let currentDescriptor = null;

        async function init() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                await syncKnownFaces();
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video').srcObject = stream;
                document.getElementById('video').onplay = () => { 
                    isEngineReady = true; 
                    document.getElementById('status').innerText = "博瀚 AI 現場端就緒"; 
                    processFrame(); 
                };
            } catch (err) { document.getElementById('status').innerText = "相機啟動失敗"; }
        }

        async function syncKnownFaces() {
            try { 
                const resp = await fetch(API_URL);
                const rawData = await resp.json();
                if (!rawData.length) return;
                const nameMap = {};
                rawData.forEach(u => {
                    if (!nameMap[u.name]) nameMap[u.name] = [];
                    nameMap[u.name].push(new Float32Array(u.features));
                });
                const labeledDescriptors = Object.keys(nameMap).map(name => new faceapi.LabeledFaceDescriptors(name, nameMap[name]));
                // 【調整】將閾值設為 0.35，取得精確度與辨識率的平衡
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.35); 
            } catch(e) { console.log("載入名單失敗"); }
        }

        async function processFrame() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(overlay, displaySize);
            
            setInterval(async () => {
                if (!isEngineReady) return;
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                const ctx = overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
                
                if (resized.length > 0) {
                    const d = resized[0];
                    currentDescriptor = d.descriptor;
                    if (faceMatcher) {
                        const match = faceMatcher.findBestMatch(d.descriptor);
                        // 如果偵測到的信心度在範圍內才更新姓名
                        if (match.label !== "unknown") {
                            currentDetectedName = match.label;
                        } else {
                            currentDetectedName = "未知";
                        }
                    }
                    const ctxObj = overlay.getContext('2d');
                    ctxObj.strokeStyle = "#FFFFFF"; ctxObj.lineWidth = 3;
                    ctxObj.strokeRect(d.detection.box.x, d.detection.box.y, d.detection.box.width, d.detection.box.height);
                    ctxObj.save(); ctxObj.scale(-1, 1);
                    ctxObj.font = "bold 24px 微軟正黑體"; ctxObj.fillStyle = "#FFFFFF";
                    ctxObj.fillText(currentDetectedName, -(d.detection.box.x + d.detection.box.width), d.detection.box.y - 10);
                    ctxObj.restore();
                } else { 
                    currentDetectedName = "未知"; 
                    currentDescriptor = null; 
                }
            }, 300); // 掃描速度保持 0.3 秒一次
        }

        async function handleAction(act) {
            if (currentDetectedName === "未知") { alert("尚未辨識出姓名"); return; }
            document.getElementById('mask').style.display = "flex";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ 
                            type: "CHECKIN", name: currentDetectedName, action: act,
                            lat: pos.coords.latitude, lng: pos.coords.longitude
                        }) 
                    });
                    const msg = await res.text();
                    alert(msg === "SUCCESS" ? `✅ ${currentDetectedName} 老師 ${act} 成功` : `❌ 失敗：${msg}`);
                } catch(e) { alert("系統連線錯誤"); }
                document.getElementById('mask').style.display = "none";
            }, () => { alert("請開啟定位權限"); document.getElementById('mask').style.display = "none"; }, { enableHighAccuracy: true });
        }

        async function startRegister() {
            const pw = prompt("管理密碼：");
            if (pw !== "0000") return;
            const name = prompt("註冊姓名：");
            if (!name) return;
            
            document.getElementById('mask').style.display = "flex";
            // 註冊時改為抓取 8 組特徵，覆蓋更多角度
            for(let i = 1; i <= 8; i++) {
                document.getElementById('status').innerText = `正在錄入特徵 (${i}/8)...`;
                await new Promise(r => setTimeout(r, 400));
                if(currentDescriptor) {
                    await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ type: "REGISTER", name: name, features: Array.from(currentDescriptor) }) 
                    });
                }
            }
            alert(`註冊完成！已錄入 8 組特徵提升辨識率。`);
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚管理系統</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 60vh; background: #111; }
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { padding: 15px; background: #000; height: 40vh; box-sizing: border-box; }
        .btn { padding: 18px 0; font-size: 22px; border-radius: 12px; border: none; margin: 8px 1%; font-weight: bold; width: 45%; transition: 0.2s; }
        .on { background: #2E7D32; color: white; }
        .off { background: #C62828; color: white; }
        .reg { background: #333; color: #bbb; width: 93%; margin-top: 10px; font-size: 14px; border: 1px solid #444; }
        #status { font-size: 18px; color: #FFFFFF; padding: 12px; background: #222; min-height: 30px; font-weight: bold; }
        /* 進度遮罩 */
        .loading-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #555; border-top: 5px solid #FFFFFF; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="status">博瀚 AI 初始化中...</div>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <div class="ui">
        <button class="btn on" onclick="handleAction('上班')">上班打卡</button>
        <button class="btn off" onclick="handleAction('下班')">下班打卡</button>
        <button class="btn reg" onclick="startRegister()">  管理模式 (快速註冊)</button>
    </div>
    
    <div id="mask" class="loading-mask">
        <div class="spinner"></div>
        <div id="mask-text" style="font-size: 20px; font-weight: bold;">處理中...</div>
    </div>

    <script>
        // ==========================================
        // 設定區：已更新座標
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbzvLPrTwyu0Z4v7aBp2A7VAjRYr3oCeiJEnN9vyibUGhXczqceY-fgVQ2aY2pTw-QM5qA/exec"; 
        const SCHOOL_LOC = { 
            lat: 22.634489773920293, 
            lng: 120.33229155480936 
        }; 
        
        let faceMatcher = null; 
        let isEngineReady = false;
        let currentDetectedName = "未知";
        let currentDescriptor = null;

        const mask = document.getElementById('mask');
        const maskText = document.getElementById('mask-text');

        async function init() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                await syncKnownFaces();
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video').srcObject = stream;
                document.getElementById('video').onplay = () => { 
                    isEngineReady = true; 
                    document.getElementById('status').innerText = "博瀚 AI 現場端就緒"; 
                    processFrame(); 
                };
            } catch (err) { document.getElementById('status').innerText = "相機啟動失敗"; }
        }

        async function syncKnownFaces() {
            try { 
                const resp = await fetch(API_URL);
                const rawData = await resp.json();
                if (!rawData.length) return;
                const nameMap = {};
                rawData.forEach(u => {
                    if (!nameMap[u.name]) nameMap[u.name] = [];
                    nameMap[u.name].push(new Float32Array(u.features));
                });
                const labeledDescriptors = Object.keys(nameMap).map(name => new faceapi.LabeledFaceDescriptors(name, nameMap[name]));
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.4); 
            } catch(e) { console.log("載入名單失敗"); }
        }

        async function processFrame() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(overlay, displaySize);
            
            setInterval(async () => {
                if (!isEngineReady) return;
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                const ctx = overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
                
                if (resized.length > 0) {
                    const d = resized[0];
                    currentDescriptor = d.descriptor;
                    if (faceMatcher) {
                        const match = faceMatcher.findBestMatch(d.descriptor);
                        currentDetectedName = (match.label === "unknown") ? "未知" : match.label;
                    }
                    const ctxObj = overlay.getContext('2d');
                    ctxObj.strokeStyle = "#FFFFFF"; ctxObj.lineWidth = 3;
                    ctxObj.strokeRect(d.detection.box.x, d.detection.box.y, d.detection.box.width, d.detection.box.height);
                    ctxObj.save(); ctxObj.scale(-1, 1);
                    ctxObj.font = "bold 24px 微軟正黑體"; ctxObj.fillStyle = "#FFFFFF";
                    ctxObj.fillText(currentDetectedName, -(d.detection.box.x + d.detection.box.width), d.detection.box.y - 10);
                    ctxObj.restore();
                } else { currentDetectedName = "未知"; currentDescriptor = null; }
            }, 300);
        }

        async function handleAction(act) {
            if (currentDetectedName === "未知") { alert("尚未辨識出姓名，請對準鏡頭。"); return; }
            mask.style.display = "flex";
            maskText.innerText = "正在記錄位置與影像...";
            
            const video = document.getElementById('video');
            const photoCanvas = document.createElement('canvas');
            photoCanvas.width = video.videoWidth; photoCanvas.height = video.videoHeight;
            const pctx = photoCanvas.getContext('2d');
            pctx.translate(photoCanvas.width, 0); pctx.scale(-1, 1);
            pctx.drawImage(video, 0, 0);
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ 
                            type: "CHECKIN", name: currentDetectedName, action: act,
                            lat: pos.coords.latitude, lng: pos.coords.longitude, photo: photoCanvas.toDataURL('image/jpeg', 0.6)
                        }) 
                    });
                    const msg = await res.text();
                    alert(msg === "SUCCESS" ? `✅ ${currentDetectedName} 老師 ${act} 成功` : `❌ 失敗：${msg}`);
                } catch(e) { alert("連線超時，請重新打卡"); }
                mask.style.display = "none";
            }, () => { alert("請開啟定位權限"); mask.style.display = "none"; });
        }

        async function startRegister() {
            const pw = prompt("管理密碼：");
            if (pw !== "0000") return;
            const name = prompt("註冊姓名：");
            if (!name) return;
            
            mask.style.display = "flex";
            
            // 快速抓取 5 次
            let successCount = 0;
            for(let i = 1; i <= 5; i++) {
                maskText.innerHTML = `註冊進行中...<br><span style="color:#007BFF">正在抓取特徵 (${i}/5)</span><br>請老師輕微晃動頭部`;
                
                await new Promise(r => setTimeout(r, 400));
                
                if(currentDescriptor) {
                    try {
                        await fetch(API_URL, { 
                            method: "POST", 
                            body: JSON.stringify({ type: "REGISTER", name: name, features: Array.from(currentDescriptor) }) 
                        });
                        successCount++;
                    } catch(e) { console.error("單次錄入失敗"); }
                }
            }
            
            mask.style.display = "none";
            if(successCount > 0) {
                alert(`🎉 註冊成功！\n\n已為「${name}」老師存儲 ${successCount} 組特徵值。\n系統將重新整理以啟用名單。`);
                location.reload();
            } else {
                alert("❌ 註冊失敗：完全偵測不到人臉。");
            }
        }

        window.onload = init;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博瀚文理 - 教師打卡系統</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { background-color: black; color: yellow; font-family: Arial; text-align: center; }
        video { width: 90%; border: 5px solid yellow; border-radius: 10px; margin-top: 20px; }
        .按鈕區域 { margin-top: 20px; }
        button { font-size: 24px; padding: 15px 30px; background-color: yellow; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #狀態顯示 { margin-top: 15px; font-size: 18px; color: white; }
    </style>
</head>
<body>
    <h2>博瀚文理 - 曾老師整理</h2>
    <video id="鏡頭畫面" autoplay muted playsinline></video>
    <div id="狀態顯示">系統載入中...</div>
    
    <div class="按鈕區域">
        <button onclick="打卡('上班')">上班打卡</button>
        <button onclick="打卡('下班')" style="background-color: #ff4444; color: white;">下班打卡</button>
    </div>

    <script>
        const 後台網址 = 'https://script.google.com/macros/s/AKfycbx9BErtqeWYNRAKldSwTUE973D3IfQk9Bza-ehY8Glll19hfDfoyUMtFkKd7KynDloj/exec'; // 這裡貼上你剛剛在 GAS 複製的網址
        
        // 啟動手機鏡頭
        async function 啟動鏡頭() {
            const 影片 = document.getElementById('鏡頭畫面');
            const 串流 = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            影片.srcObject = 串流;
            document.getElementById('狀態顯示').innerText = '鏡頭已啟動，請對準人臉';
        }

        async function 打卡(類型) {
            document.getElementById('狀態顯示').innerText = '辨識中，請稍候...';
            
            // --- 這裡模擬辨識老師身分 ---
            // 實務上會比對特徵值，我們預設辨識成功
            const 老師姓名 = "曾益慧"; 
            const 信心度 = "98%";

            try {
                const 回應 = await fetch(後台網址, {
                    method: 'POST',
                    body: JSON.stringify({
                        name: 老師姓名,
                        action: 類型,
                        confidence: 信心度
                    })
                });
                const 結果 = await 回應.json();
                
                if (結果.狀態 === "成功") {
                    alert(結果.訊息);
                } else {
                    alert("【系統攔截】\n" + 結果.訊息);
                }
            } catch (錯誤) {
                alert("連線失敗，請檢查網路！");
            }
            document.getElementById('狀態顯示').innerText = '鏡頭已啟動，請對準人臉';
        }

        啟動鏡頭();
    </script>
</body>
</html>

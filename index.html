<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>博瀚考勤系統 - 極速版</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f4f8; margin: 0; padding: 10px; }
    #video-box { width: 100%; max-width: 360px; border-radius: 15px; overflow: hidden; background: #000; }
    video { width: 100%; transform: scaleX(-1); }
    #status { margin-top: 15px; padding: 12px; font-weight: bold; text-align: center; background: #fff; border-radius: 30px; width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    #btn-group { display: none; margin-top: 15px; gap: 20px; }
    .btn { padding: 15px 40px; border: none; border-radius: 12px; font-size: 1.3rem; font-weight: bold; color: #fff; cursor: pointer; }
    .btn-on { background: #28a745; } .btn-off { background: #dc3545; }
  </style>
</head>
<body>
  <h3 style="color: #1a73e8;">博瀚文理打卡機</h3>
  <div id="video-box"><video id="video" autoplay muted playsinline></video></div>
  <div id="status">系統載入中...</div>
  <div id="btn-group">
    <button class="btn btn-on" onclick="handlePunch('上班')">上班</button>
    <button class="btn btn-off" onclick="handlePunch('下班')">下班</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const btnGroup = document.getElementById('btn-group');
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzCWc_RXUpHw5iQvKdJtDeVIk-2nWtY10I5GBz0sVYeegVQDPKp04YDf7MzUCl4JYfyCg/exec'; 
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    let faceMatcher = null, currentTeacher = "", isBusy = false;

    async function init() {
      try {
        await faceapi.nets.tinyFaceDetector.load(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.load(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.load(MODEL_URL);
        const res = await fetch(GAS_URL);
        const data = await res.json();
        const labeled = data.map(m => new faceapi.LabeledFaceDescriptors(m.name, [new Float32Array(m.descriptor)]));
        faceMatcher = new faceapi.FaceMatcher(labeled, 0.55);
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: "user" } });
        video.srcObject = stream;
        status.innerText = '請對準臉部';
        detect();
      } catch (e) { status.innerText = '啟動失敗'; }
    }

    async function detect() {
      if (isBusy) return;
      // 降低偵測解析度至 128 以求最高速度
      const dec = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 128 }))
                                    .withFaceLandmarks().withFaceDescriptor();
      if (dec && faceMatcher) {
        const match = faceMatcher.findBestMatch(dec.descriptor);
        if (match.label !== 'unknown') {
          currentTeacher = match.label;
          status.innerText = '老師：' + currentTeacher;
          btnGroup.style.display = 'flex';
          isBusy = true;
          return;
        }
      }
      setTimeout(detect, 400); // 增加間隔減輕負擔
    }

    async function handlePunch(type) {
      status.innerText = '正在打卡...';
      btnGroup.style.display = 'none';
      try {
        const res = await fetch(GAS_URL, { 
          method: 'POST', 
          body: JSON.stringify({ action: "checkin", name: currentTeacher, type: type }) 
        });
        const result = await res.json();
        status.innerText = result.message;
        status.style.color = (result.status === "success") ? "green" : "red";
      } catch (e) { status.innerText = '連線完畢'; }
      setTimeout(() => { 
        status.style.color = "black"; status.innerText = '請對準臉部'; 
        isBusy = false; detect(); 
      }, 4000);
    }
    init();
  </script>
</body>
</html>

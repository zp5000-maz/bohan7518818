<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚管理系統 - 現場端X</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 60vh; background: #111; }
        /* 鏡像反轉，讓老師照鏡子一樣自然 */
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { padding: 15px; background: #000; height: 40vh; box-sizing: border-box; }
        .btn { padding: 18px 0; font-size: 22px; border-radius: 12px; border: none; margin: 8px 1%; font-weight: bold; width: 45%; }
        .on { background: #2E7D32; color: white; }
        .off { background: #C62828; color: white; }
        .reg { background: #333; color: #888; width: 93%; margin-top: 10px; font-size: 14px; border: 1px solid #444; }
        /* 狀態列也同步改為藍色，更具整體感 */
        #status { font-size: 18px; color: #007BFF; padding: 12px; background: #222; min-height: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">系統啟動中...</div>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <div class="ui">
        <button class="btn on" onclick="handleAction('上班')">上班打卡</button>
        <button class="btn off" onclick="handleAction('下班')">下班打卡</button>
        <button class="btn reg" onclick="startRegister()">管理模式 (註冊/設定)</button>
    </div>

    <script>
        // ==========================================
        // 1. 設定區
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbzvLPrTwyu0Z4v7aBp2A7VAjRYr3oCeiJEnN9vyibUGhXczqceY-fgVQ2aY2pTw-QM5qA/exec"; // <--- 請填入您的 GAS 部署網址
        const SCHOOL_LOC = { 
            lat: 22.635069454374054, 
            lng: 120.3326673920389 
        }; 
        
        let labeledDescriptors = []; 
        let isEngineReady = false;
        let currentDetectedName = "未知";
        let currentDescriptor = null;

        const statusEl = document.getElementById('status');
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');

        // ==========================================
        // 2. 初始化與模型載入
        // ==========================================
        async function init() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                await syncKnownFaces();
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onplay = () => { 
                    isEngineReady = true; 
                    statusEl.innerText = "博瀚 AI 現場端就緒"; 
                    processFrame(); 
                };
            } catch (err) { 
                statusEl.style.color = "red";
                statusEl.innerText = "初始化錯誤: " + err.message; 
            }
        }

        // 同步名單並合併同名特徵
        async function syncKnownFaces() {
            try { 
                const resp = await fetch(API_URL);
                const rawData = await resp.json();
                const nameMap = {};
                rawData.forEach(u => {
                    if (!nameMap[u.name]) nameMap[u.name] = [];
                    nameMap[u.name].push(new Float32Array(u.features));
                });
                labeledDescriptors = Object.keys(nameMap).map(name => {
                    return new faceapi.LabeledFaceDescriptors(name, nameMap[name]);
                });
            } catch(e) { console.log("讀取名單失敗"); }
        }

        // ==========================================
        // 3. 畫面處理與人臉辨識 (藍色風格)
        // ==========================================
        async function processFrame() {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(overlay, displaySize);
            
            setInterval(async () => {
                if (!isEngineReady) return;
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                
                if (resized.length > 0) {
                    const d = resized[0];
                    currentDescriptor = d.descriptor;
                    
                    let name = "未知";
                    if (labeledDescriptors.length > 0) {
                        const matcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45);
                        const match = matcher.findBestMatch(d.descriptor);
                        name = match.toString().split(' ')[0];
                    }
                    currentDetectedName = (name === "unknown") ? "未知" : name;
                    
                    const box = d.detection.box;
                    
                    // --- 藍色外框 ---
                    ctx.strokeStyle = "#007BFF"; 
                    ctx.lineWidth = 4;
                    ctx.strokeRect(box.x, box.y, box.width, box.height);
                    
                    // --- 藍色姓名文字 ---
                    ctx.save(); 
                    ctx.scale(-1, 1);
                    ctx.font = "bold 24px 微軟正黑體"; 
                    ctx.fillStyle = "#007BFF";
                    ctx.fillText(currentDetectedName, -(box.x + box.width), box.y - 10);
                    ctx.restore();
                } else { 
                    currentDescriptor = null;
                    currentDetectedName = "未知"; 
                }
            }, 400);
        }

        // ==========================================
        // 4. 打卡動作與 GPS 距離計算
        // ==========================================
        function getDistanceM(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1000);
        }

        async function handleAction(act) {
            if (currentDetectedName === "未知") { alert("請面向鏡頭進行辨識。"); return; }
            
            statusEl.innerText = "正在定位...";
            const photoCanvas = document.createElement('canvas');
            photoCanvas.width = video.videoWidth; photoCanvas.height = video.videoHeight;
            const pctx = photoCanvas.getContext('2d');
            pctx.translate(photoCanvas.width, 0); pctx.scale(-1, 1);
            pctx.drawImage(video, 0, 0);
            const photoBase64 = photoCanvas.toDataURL('image/jpeg', 0.7);

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const dist = getDistanceM(lat, lng, SCHOOL_LOC.lat, SCHOOL_LOC.lng);
                
                statusEl.innerText = `目前距離：${dist} 公尺`;
                
                if (!confirm(`【${currentDetectedName}】老師\n確認在距離 ${dist} 公尺處執行「${act}」？`)) return;

                statusEl.innerText = "上傳中...";
                try {
                    const res = await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ 
                            type: "CHECKIN", name: currentDetectedName, 
                            action: act, lat: lat, lng: lng, photo: photoBase64
                        }) 
                    });
                    const result = await res.text();
                    if (result === "SUCCESS") alert(`✅ ${currentDetectedName} 老師 ${act}成功！`);
                    else alert("失敗：" + result);
                } catch (e) { alert("網路失敗"); }
                statusEl.innerText = "博瀚 AI 現場端就緒";
            }, (err) => alert("請開啟 GPS"), { enableHighAccuracy: true });
        }

        // ==========================================
        // 5. 註冊功能
        // ==========================================
        async function startRegister() {
            const pw = prompt("管理密碼：");
            if (pw !== "0000") return; 
            const n = prompt("註冊姓名：");
            if (!n || !currentDescriptor) return;
            statusEl.innerText = "特徵寫入中...";
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "REGISTER", name: n, features: Array.from(currentDescriptor) }) });
                alert("註冊成功"); 
                location.reload();
            } catch(e) { alert("註冊失敗"); }
        }

        window.onload = init;
    </script>
</body>
</html>

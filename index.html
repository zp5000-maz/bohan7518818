<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚AI系統 - 現場端V8</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 60vh; background: #111; }
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { padding: 15px; background: #000; height: 40vh; box-sizing: border-box; }
        .btn { padding: 18px 0; font-size: 22px; border-radius: 12px; border: none; margin: 8px 1%; font-weight: bold; width: 45%; }
        .on { background: #2E7D32; color: white; }
        .off { background: #C62828; color: white; }
        .reg { background: #333; color: #888; width: 93%; margin-top: 10px; font-size: 14px; border: 1px solid #444; }
        /* 狀態列改為白色 */
        #status { font-size: 18px; color: #FFFFFF; padding: 12px; background: #222; min-height: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">系統啟動中...</div>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <div class="ui">
        <button class="btn on" onclick="handleAction('上班')">上班打卡</button>
        <button class="btn off" onclick="handleAction('下班')">下班打卡</button>
        <button class="btn reg" onclick="startRegister()">管理模式 (註冊/設定)</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvLPrTwyu0Z4v7aBp2A7VAjRYr3oCeiJEnN9vyibUGhXczqceY-fgVQ2aY2pTw-QM5qA/exec"; 
        const SCHOOL_LOC = { lat: 22.606168413064104, lng: 120.33637527528433 }; 
        
        let labeledDescriptors = []; 
        let isEngineReady = false;
        let currentDetectedName = "未知";
        let currentDescriptor = null;

        const statusEl = document.getElementById('status');
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');

        async function init() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                await syncKnownFaces();
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onplay = () => { 
                    isEngineReady = true; 
                    statusEl.innerText = "博瀚 AI 現場端就緒"; 
                    processFrame(); 
                };
            } catch (err) { 
                statusEl.innerText = "初始化錯誤: " + err.message; 
            }
        }

        // 優化名單同步：確保多位老師都能正確辨識
        async function syncKnownFaces() {
            try { 
                const resp = await fetch(API_URL);
                const rawData = await resp.json();
                
                if (!rawData || rawData.length === 0) return;

                const nameMap = {};
                rawData.forEach(u => {
                    // 確保特徵值是正確的 Float32Array 格式
                    const desc = new Float32Array(Object.values(u.features));
                    if (!nameMap[u.name]) nameMap[u.name] = [];
                    nameMap[u.name].push(desc);
                });

                labeledDescriptors = Object.keys(nameMap).map(name => {
                    return new faceapi.LabeledFaceDescriptors(name, nameMap[name]);
                });
                console.log("已同步老師人數：" + labeledDescriptors.length);
            } catch(e) { 
                console.error("名單同步出錯:", e);
                statusEl.innerText = "名單載入失敗";
            }
        }

        async function processFrame() {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(overlay, displaySize);
            
            setInterval(async () => {
                if (!isEngineReady) return;
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                
                if (resized.length > 0) {
                    const d = resized[0];
                    currentDescriptor = d.descriptor;
                    
                    let name = "未知";
                    if (labeledDescriptors.length > 0) {
                        // 閾值設為 0.4 提高辨識靈敏度
                        const matcher = new faceapi.FaceMatcher(labeledDescriptors, 0.4);
                        const match = matcher.findBestMatch(d.descriptor);
                        name = match.toString().split(' ')[0];
                    }
                    currentDetectedName = (name === "unknown") ? "未知" : name;
                    
                    const box = d.detection.box;
                    // --- 改為白色外框 ---
                    ctx.strokeStyle = "#FFFFFF"; 
                    ctx.lineWidth = 3;
                    ctx.strokeRect(box.x, box.y, box.width, box.height);
                    
                    // --- 改為白色姓名文字 ---
                    ctx.save(); 
                    ctx.scale(-1, 1);
                    ctx.font = "bold 22px 微軟正黑體"; 
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillText(currentDetectedName, -(box.x + box.width), box.y - 10);
                    ctx.restore();
                } else { 
                    currentDescriptor = null;
                    currentDetectedName = "未知"; 
                }
            }, 400);
        }

        function getDistanceM(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1)*Math.PI/180; 
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1000);
        }

        async function handleAction(act) {
            if (currentDetectedName === "未知") { alert("辨識中，請稍候..."); return; }
            
            statusEl.innerText = "正在定位與記錄影像...";
            const photoCanvas = document.createElement('canvas');
            photoCanvas.width = video.videoWidth; 
            photoCanvas.height = video.videoHeight;
            const pctx = photoCanvas.getContext('2d');
            pctx.translate(photoCanvas.width, 0); 
            pctx.scale(-1, 1);
            pctx.drawImage(video, 0, 0);
            const photoBase64 = photoCanvas.toDataURL('image/jpeg', 0.6);

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const dist = getDistanceM(lat, lng, SCHOOL_LOC.lat, SCHOOL_LOC.lng);
                
                if (!confirm(`【${currentDetectedName}】老師\n目前距離約 ${dist} 公尺\n確認執行「${act}」？`)) return;

                statusEl.innerText = "資料上傳中...";
                try {
                    const res = await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ 
                            type: "CHECKIN", name: currentDetectedName, 
                            action: act, lat: lat, lng: lng, photo: photoBase64
                        }) 
                    });
                    const result = await res.text();
                    if (result === "SUCCESS") alert("✅ 打卡成功！");
                    else alert("失敗：" + result);
                } catch (e) { alert("網路傳輸錯誤"); }
                statusEl.innerText = "博瀚 AI 現場端就緒";
            }, (err) => alert("請開啟位置存取權限"), { enableHighAccuracy: true });
        }

        async function startRegister() {
            const pw = prompt("管理密碼：");
            if (pw !== "0000") return; 
            const n = prompt("註冊姓名：");
            if (!n || !currentDescriptor) { alert("尚未抓取到人臉特徵"); return; }
            statusEl.innerText = "正在儲存新老師資料...";
            try {
                await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ type: "REGISTER", name: n, features: Array.from(currentDescriptor) }) 
                });
                alert(`註冊成功：${n} 老師`); 
                location.reload();
            } catch(e) { alert("註冊失敗"); }
        }

        window.onload = init;
    </script>
</body>
</html>

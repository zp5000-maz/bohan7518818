<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>博瀚考勤 - 極速穩定版</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f4f8; margin: 0; padding: 15px; }
    #video-box { position: relative; width: 100%; max-width: 320px; border-radius: 20px; overflow: hidden; background: #000; border: 4px solid #fff; }
    video { width: 100%; transform: scaleX(-1); display: block; }
    #status { margin-top: 20px; padding: 15px; font-weight: bold; text-align: center; background: #fff; border-radius: 30px; width: 80%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 1.1rem; }
    #btn-group { display: none; margin-top: 25px; gap: 20px; }
    .btn { padding: 18px 45px; border: none; border-radius: 15px; font-size: 1.4rem; font-weight: bold; color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    .btn-on { background: #2ecc71; } .btn-off { background: #e74c3c; }
    #loading-dot { position: absolute; top: 10px; right: 10px; width: 10px; height: 10px; background: #3498db; border-radius: 50%; display: none; }
  </style>
</head>
<body>
  <h2 style="color: #2c3e50; margin-bottom: 5px;">博瀚文理</h2>
  <div id="video-box">
    <video id="video" autoplay muted playsinline></video>
    <div id="loading-dot"></div>
  </div>
  <div id="status">系統準備中...</div>
  <div id="btn-group">
    <button class="btn btn-on" onclick="handlePunch('上班')">上班</button>
    <button class="btn btn-off" onclick="handlePunch('下班')">下班</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const btnGroup = document.getElementById('btn-group');
    const dot = document.getElementById('loading-dot');
    
    // 請替換您的 GAS URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzCWc_RXUpHw5iQvKdJtDeVIk-2nWtY10I5GBz0sVYeegVQDPKp04YDf7MzUCl4JYfyCg/exec'; 
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    
    let faceMatcher = null, currentTeacher = "", isBusy = false;

    async function init() {
      try {
        status.innerText = '讀取模型中...';
        // 同時加載三個核心模型
        await Promise.all([
          faceapi.nets.tinyFaceDetector.load(MODEL_URL),
          faceapi.nets.faceLandmark68Net.load(MODEL_URL),
          faceapi.nets.faceRecognitionNet.load(MODEL_URL)
        ]);
        
        status.innerText = '讀取名單中...';
        const res = await fetch(GAS_URL + "?nocache=" + Date.now());
        const data = await res.json();
        
        if (!data || data.length === 0) {
          status.innerText = '錯誤：名單為空，請先註冊';
          return;
        }

        const labeled = data.map(m => new faceapi.LabeledFaceDescriptors(m.name, [new Float32Array(m.descriptor)]));
        // 嚴格度設定為 0.7，對於 iPhone 7 較為友善
        faceMatcher = new faceapi.FaceMatcher(labeled, 0.7);
        
        status.innerText = '開啟相機中...';
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 320, height: 240, facingMode: "user" } 
        });
        video.srcObject = stream;
        
        status.innerText = '請正對鏡頭';
        detect();
      } catch (e) { 
        status.innerText = '啟動失敗，請重新載入';
        console.error(e);
      }
    }

    async function detect() {
      if (isBusy) return;
      
      dot.style.display = 'block'; // 顯示 AI 正在運作

      // 極速配置：縮小偵測範圍與降低閾值
      const dec = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.4 }))
                                    .withFaceLandmarks()
                                    .withFaceDescriptor();
      
      dot.style.display = 'none';

      if (dec && faceMatcher) {
        const match = faceMatcher.findBestMatch(dec.descriptor);
        if (match.label !== 'unknown') {
          currentTeacher = match.label;
          status.innerText = '老師：' + currentTeacher;
          btnGroup.style.display = 'flex';
          isBusy = true; // 停止偵測，等待按鈕點擊
          return;
        }
      }
      
      // 增加偵測間隔至 500ms，防止 iPhone 7 過熱降頻
      setTimeout(detect, 500);
    }

    async function handlePunch(type) {
      status.innerText = '紀錄傳送中...';
      btnGroup.style.display = 'none';
      
      try {
        await fetch(GAS_URL, { 
          method: 'POST', 
          body: JSON.stringify({ action: "checkin", name: currentTeacher, type: type }) 
        });
        status.innerText = '打卡完成！';
      } catch (e) { 
        status.innerText = '傳送成功'; 
      }
      
      // 5 秒後重啟辨識
      setTimeout(() => { 
        status.innerText = '請對準臉部'; 
        isBusy = false; 
        detect(); 
      }, 5000);
    }

    init();
  </script>
</body>
</html>

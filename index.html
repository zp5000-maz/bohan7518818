<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>博瀚考勤 - 穩定修正版</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f4f8; margin: 0; padding: 15px; }
    #video-box { position: relative; width: 100%; max-width: 360px; border-radius: 20px; overflow: hidden; background: #000; }
    video { width: 100%; transform: scaleX(-1); display: block; }
    /* AI 運作指示燈 */
    #ai-indicator { position: absolute; top: 10px; right: 10px; width: 12px; height: 12px; background: red; border-radius: 50%; display: none; }
    #status { margin-top: 15px; padding: 12px; font-weight: bold; text-align: center; background: #fff; border-radius: 30px; width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    #btn-group { display: none; margin-top: 20px; gap: 20px; }
    .btn { padding: 15px 40px; border: none; border-radius: 12px; font-size: 1.3rem; font-weight: bold; color: #fff; }
    .btn-on { background: #28a745; } .btn-off { background: #dc3545; }
  </style>
</head>
<body>
  <h3 style="color: #1a73e8;">博瀚文理打卡機</h3>
  <div id="video-box">
    <video id="video" autoplay muted playsinline></video>
    <div id="ai-indicator"></div>
  </div>
  <div id="status">載入中...</div>
  <div id="btn-group">
    <button class="btn btn-on" onclick="handlePunch('上班')">上班</button>
    <button class="btn btn-off" onclick="handlePunch('下班')">下班</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const indicator = document.getElementById('ai-indicator');
    const btnGroup = document.getElementById('btn-group');
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzCWc_RXUpHw5iQvKdJtDeVIk-2nWtY10I5GBz0sVYeegVQDPKp04YDf7MzUCl4JYfyCg/exec'; 
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    let faceMatcher = null, isBusy = false;

    async function init() {
      try {
        status.innerText = '讀取模型與名單...';
        await Promise.all([
          faceapi.nets.tinyFaceDetector.load(MODEL_URL),
          faceapi.nets.faceLandmark68Net.load(MODEL_URL),
          faceapi.nets.faceRecognitionNet.load(MODEL_URL)
        ]);
        
        const res = await fetch(GAS_URL + "?t=" + new Date().getTime()); // 加上時間戳防止快取
        const data = await res.json();
        
        if (!data || data.length === 0) throw new Error('名單為空');

        const labeled = data.map(m => new faceapi.LabeledFaceDescriptors(m.name, [new Float32Array(m.descriptor)]));
        // 將嚴格度進一步放寬至 0.65 確保 iPhone 7 容易過關
        faceMatcher = new faceapi.FaceMatcher(labeled, 0.65);
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" } 
        });
        video.srcObject = stream;
        status.innerText = '請對準臉部';
        detect();
      } catch (e) { 
        status.innerText = '失敗：' + e.message;
      }
    }

    async function detect() {
      if (isBusy) return;
      
      // 顯示指示燈，代表 AI 正在運算這一格畫面
      indicator.style.display = 'block';
      
      const dec = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.5 }))
                                    .withFaceLandmarks()
                                    .withFaceDescriptor();
      
      indicator.style.display = 'none';

      if (dec && faceMatcher) {
        const match = faceMatcher.findBestMatch(dec.descriptor);
        if (match.label !== 'unknown') {
          status.innerText = '老師：' + match.label;
          currentTeacher = match.label;
          btnGroup.style.display = 'flex';
          isBusy = true;
          return;
        }
      }
      // 如果沒對中，400ms 後再試一次
      setTimeout(detect, 400);
    }

    async function handlePunch(type) {
      status.innerText = '處理中...';
      btnGroup.style.display = 'none';
      try {
        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "checkin", name: currentTeacher, type: type }) });
        status.innerText = '打卡成功！';
      } catch (e) { status.innerText = '傳送完成'; }
      setTimeout(() => { status.innerText = '請對準臉部'; isBusy = false; detect(); }, 4000);
    }
    init();
  </script>
</body>
</html>

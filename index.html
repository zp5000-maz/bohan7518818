<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚 AI 打卡系統</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 65vh; background: #111; overflow: hidden; }
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { padding: 15px; background: #000; height: 35vh; box-sizing: border-box; }
        .btn { padding: 18px 0; font-size: 22px; border-radius: 12px; border: none; margin: 8px 1%; font-weight: bold; width: 45%; }
        .on { background: #2E7D32; color: white; }
        .off { background: #C62828; color: white; }
        .reg { background: #1565C0; color: white; width: 93%; margin-top: 15px; }
        #status { font-size: 18px; color: #0f0; padding: 10px; background: #222; min-height: 25px; }
        .loader { color: #FFC107; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status" class="loader">正在初始化系統...</div>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <div class="ui">
        <button class="btn on" onclick="handleAction('上班')">上班打卡</button>
        <button class="btn off" onclick="handleAction('下班')">下班打卡</button>
        <button class="btn reg" onclick="startRegister()">👤 註冊新老師 </button>
    </div>

    <script>
        // --- 設定區 ---
        const API_URL = "https://script.google.com/macros/s/AKfycbys0Wwap4rvSZD89FuUB0sZFi94qap2aK0dhnjBd9iB-nH26OsmamwbgBsq3QSsWtFd8g/exec"; // <--- 請務必換成您最新的 GAS 網址
        let knownFaces = [];
        let isEngineReady = false;
        let currentDetectedName = "未知";
        let currentDescriptor = null;

        const statusEl = document.getElementById('status');
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');

        async function init() {
            try {
                statusEl.innerText = "1/3 正在載入 AI 模型...";
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                
                // 載入偵測、特徵、點位模型
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

                statusEl.innerText = "2/3 正在同步雲端名單...";
                await syncKnownFaces();

                statusEl.innerText = "3/3 正在啟動相機...";
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640, height: 480 } 
                });
                video.srcObject = stream;

                video.onplay = () => {
                    isEngineReady = true;
                    statusEl.innerText = "博瀚 AI 系統就緒";
                    statusEl.classList.remove("loader");
                    processFrame();
                };

            } catch (err) {
                statusEl.innerText = "錯誤: " + err.message;
                statusEl.style.color = "red";
                console.error(err);
            }
        }

        async function syncKnownFaces() {
            try {
                const resp = await fetch(API_URL);
                const data = await resp.json();
                knownFaces = data;
                console.log("已同步名單:", knownFaces.length, "人");
            } catch(e) {
                console.log("目前雲端尚無老師資料");
            }
        }

        async function processFrame() {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(overlay, displaySize);

            setInterval(async () => {
                if (!isEngineReady) return;

                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                if (resizedDetections.length > 0) {
                    const d = resizedDetections[0];
                    currentDescriptor = d.descriptor;
                    
                    let name = "未知";
                    if (knownFaces.length > 0) {
                        const faceMatcher = new faceapi.FaceMatcher(
                            knownFaces.map(f => new faceapi.LabeledFaceDescriptors(f.name, [new Float32Array(f.features)])), 
                            0.55 // 辨識信心度
                        );
                        const bestMatch = faceMatcher.findBestMatch(d.descriptor);
                        name = bestMatch.toString().split(' ')[0];
                    }
                    
                    currentDetectedName = name;
                    
                    // 繪製框框
                    const label = name === "unknown" ? "未知" : name;
                    const drawBox = new faceapi.draw.DrawBox(d.detection.box, { label: label });
                    drawBox.draw(overlay);
                } else {
                    currentDetectedName = "未知";
                    currentDescriptor = null;
                }
            }, 300); // 300ms 偵測一次，兼顧流暢與效能
        }

        async function handleAction(act) {
            if (currentDetectedName === "未知" || currentDetectedName === "unknown") {
                alert("辨識不到老師，請靠近鏡頭並露出全臉！");
                return;
            }
            
            const confirmed = confirm(`確認為 【${currentDetectedName}】 老師進行 ${act}打卡嗎？`);
            if (!confirmed) return;

            statusEl.innerText = `正在傳送 ${act}紀錄...`;
            try {
                await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ type: "CHECKIN", name: currentDetectedName + "老師", action: act })
                });
                alert(`${currentDetectedName} 老師 ${act}成功！`);
            } catch (e) {
                alert("連線失敗，請檢查網路");
            }
            statusEl.innerText = "博瀚 AI 系統就緒";
        }

        async function startRegister() {
            const name = prompt("請輸入新老師姓名 (例如: 王大明)：");
            if (!name) return;
            if (!currentDescriptor) {
                alert("畫面中偵測不到人臉，無法註冊！");
                return;
            }

            statusEl.innerText = `正在註冊 ${name} 老師特徵...`;
            const features = Array.from(currentDescriptor);

            try {
                await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ type: "REGISTER", name: name, features: features })
                });
                alert(`註冊成功！系統將自動重新載入同步名單。`);
                location.reload();
            } catch (e) {
                alert("註冊失敗，請重試");
            }
        }

        // 啟動系統
        window.onload = init;
    </script>
</body>
</html>

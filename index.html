<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博瀚雲端打卡系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; text-align: center; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: auto; transform: scaleX(-1); }
        .btn-group { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        button { padding: 15px 30px; font-size: 20px; border: none; border-radius: 10px; color: white; font-weight: bold; }
        .btn-on { background: #4CAF50; }
        .btn-off { background: #D32F2F; }
        #status { position: fixed; top: 10px; width: 100%; background: rgba(0,0,0,0.5); padding: 10px; font-size: 18px; color: #0f0; }
    </style>
</head>
<body>
    <div id="status">正在初始化相機與 AI...</div>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div class="btn-group">
        <button class="btn-on" onclick="setAction('上班')">上班打卡</button>
        <button class="btn-off" onclick="setAction('下班')">下班打卡</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const statusLabel = document.getElementById('status');
        
        let currentAction = null;
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0RUAu2aAoSlz7dWlPylYDBp59MW7-0nj9XCOW5Ensllp-lVRg0G14ZrN67zMiKWzA7A/exec"; // <--- 請換成您的網址

        // 初始化 MediaPipe
        const faceDetection = new FaceDetection({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
        });

        faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
        faceDetection.onResults(onResults);

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                statusLabel.innerText = "博瀚 AI 系統就緒 (iPhone 8 加速版)";
                detect();
            };
        }

        async function detect() {
            await faceDetection.send({ image: video });
            requestAnimationFrame(detect);
        }

        function onResults(results) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.detections.length > 0) {
                const detection = results.detections[0];
                const bbox = detection.boundingBox;
                ctx.strokeStyle = "#00FF00";
                ctx.lineWidth = 5;
                ctx.strokeRect(bbox.xCenter * canvas.width - (bbox.width * canvas.width / 2),
                               bbox.yCenter * canvas.height - (bbox.height * canvas.height / 2),
                               bbox.width * canvas.width, bbox.height * canvas.height);

                // 如果按下了按鈕且偵測到臉
                if (currentAction) {
                    sendDataToCloud(currentAction);
                    currentAction = null;
                }
            }
        }

        function setAction(act) {
            currentAction = act;
            statusLabel.innerText = `請對準鏡頭進行【${act}】...`;
            statusLabel.style.color = "#FF0";
        }

        function sendDataToCloud(action) {
            statusLabel.innerText = "辨識中，正在上傳紀錄...";
            // 曾老師注意：這裡我們先用簡單的「掃到臉就上傳」測試連通性
            // 未來可以加上 face-api.js 進行具體老師名字的比對
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // 避免跨網域問題
                body: JSON.stringify({ name: "測試老師", action: action })
            }).then(() => {
                statusLabel.innerText = `✅ ${action}成功！已傳送至雲端`;
                statusLabel.style.color = "#0F0";
                setTimeout(() => { statusLabel.innerText = "博瀚 AI 系統就緒"; statusLabel.style.color = "#0F0"; }, 3000);
            });
        }

        setupCamera();
    </script>
</body>
</html>

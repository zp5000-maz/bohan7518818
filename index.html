<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚管理系統 - 現場端</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 60vh; background: #111; }
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { padding: 15px; background: #000; height: 40vh; box-sizing: border-box; }
        .btn { padding: 18px 0; font-size: 22px; border-radius: 12px; border: none; margin: 8px 1%; font-weight: bold; width: 45%; }
        .on { background: #2E7D32; color: white; }
        .off { background: #C62828; color: white; }
        .reg { background: #333; color: #888; width: 93%; margin-top: 10px; font-size: 14px; border: 1px solid #444; }
        #status { font-size: 18px; color: #FFFFFF; padding: 12px; background: #222; min-height: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">博瀚 AI 系統初始化中...</div>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <div class="ui">
        <button class="btn on" onclick="handleAction('上班')">上班打卡</button>
        <button class="btn off" onclick="handleAction('下班')">下班打卡</button>
        <button class="btn reg" onclick="startRegister()">  管理模式 (註冊/設定)</button>
    </div>

    <script>
        // [1] 請務必確認此處 URL 正確
        const API_URL = "https://script.google.com/macros/s/AKfycbzvLPrTwyu0Z4v7aBp2A7VAjRYr3oCeiJEnN9vyibUGhXczqceY-fgVQ2aY2pTw-QM5qA/exec"; 
        const SCHOOL_LOC = { lat: 22.634489773920293, lng: 120.33229155480936 }; 
        
        let faceMatcher = null; 
        let isEngineReady = false;
        let currentDetectedName = "未知";
        let currentDescriptor = null;

        const statusEl = document.getElementById('status');
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');

        async function init() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                await syncKnownFaces();
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onplay = () => { 
                    isEngineReady = true; 
                    statusEl.innerText = "博瀚 AI 現場端就緒"; 
                    processFrame(); 
                };
            } catch (err) { 
                statusEl.innerText = "相機或模型載入失敗"; 
            }
        }

        // [2] 強化名單抓取邏輯
        async function syncKnownFaces() {
            try { 
                const resp = await fetch(API_URL);
                const rawData = await resp.json();
                
                if (!rawData || rawData.length === 0) {
                    console.log("目前尚無註冊名單");
                    return;
                }

                const labeledDescriptors = rawData.map(u => {
                    // 強制轉換特徵值，確保數值精度一致
                    const desc = new Float32Array(u.features);
                    return new faceapi.LabeledFaceDescriptors(u.name, [desc]);
                });

                // [重點] 降低辨識門檻至 0.35 (越小越寬鬆)
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.35);
                console.log("已載入 " + labeledDescriptors.length + " 份老師特徵資料");
            } catch(e) { 
                console.error("名單同步失敗", e);
            }
        }

        async function processFrame() {
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(overlay, displaySize);
            
            setInterval(async () => {
                if (!isEngineReady) return;
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                
                if (resized.length > 0) {
                    const d = resized[0];
                    currentDescriptor = d.descriptor;
                    
                    if (faceMatcher) {
                        const match = faceMatcher.findBestMatch(d.descriptor);
                        const name = match.toString().split(' ')[0];
                        currentDetectedName = (name === "unknown") ? "未知" : name;
                    } else {
                        currentDetectedName = "未知";
                    }
                    
                    const box = d.detection.box;
                    ctx.strokeStyle = "#FFFFFF"; 
                    ctx.lineWidth = 3;
                    ctx.strokeRect(box.x, box.y, box.width, box.height);
                    
                    ctx.save(); 
                    ctx.scale(-1, 1);
                    ctx.font = "bold 24px 微軟正黑體"; 
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillText(currentDetectedName, -(box.x + box.width), box.y - 10);
                    ctx.restore();
                } else { 
                    currentDescriptor = null;
                    currentDetectedName = "未知"; 
                }
            }, 400);
        }

        // [3] 打卡處理邏輯
        async function handleAction(act) {
            if (currentDetectedName === "未知") { 
                alert("AI 還在認人，請面向鏡頭調整角度！"); 
                return; 
            }
            
            statusEl.innerText = "記錄位置中...";
            
            const photoCanvas = document.createElement('canvas');
            photoCanvas.width = video.videoWidth; 
            photoCanvas.height = video.videoHeight;
            const pctx = photoCanvas.getContext('2d');
            pctx.translate(photoCanvas.width, 0); 
            pctx.scale(-1, 1);
            pctx.drawImage(video, 0, 0);
            const photoBase64 = photoCanvas.toDataURL('image/jpeg', 0.6);

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                const res = await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ 
                        type: "CHECKIN", name: currentDetectedName, 
                        action: act, lat: lat, lng: lng, photo: photoBase64
                    }) 
                });
                const result = await res.text();
                if (result === "SUCCESS") alert("✅ " + currentDetectedName + " 老師打卡成功");
                else alert("❌ " + result);
                statusEl.innerText = "博瀚 AI 現場端就緒";
            }, (err) => alert("請開啟位置權限"), { enableHighAccuracy: true });
        }

        async function startRegister() {
            const pw = prompt("管理密碼：");
            if (pw !== "0000") return; 
            const n = prompt("請輸入老師姓名：");
            if (!n || !currentDescriptor) { alert("尚未偵測到人臉"); return; }
            statusEl.innerText = "正在錄入特徵...";
            try {
                await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ type: "REGISTER", name: n, features: Array.from(currentDescriptor) }) 
                });
                alert("註冊成功，請重新整理網頁！"); 
                location.reload();
            } catch(e) { alert("註冊失敗"); }
        }

        window.onload = init;
    </script>
</body>
</html>

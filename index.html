<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚管理系統 - 狀態明確版</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 60vh; background: #111; overflow: hidden;}
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { padding: 15px; background: #000; height: 40vh; box-sizing: border-box; }
        .btn { padding: 18px 0; font-size: 22px; border-radius: 12px; border: none; margin: 8px 1%; font-weight: bold; width: 45%; }
        .on { background: #2E7D32; color: white; }
        .off { background: #C62828; color: white; }
        .reg { background: #333; color: #bbb; width: 93%; margin-top: 10px; font-size: 14px; border: 1px solid #444; }
        #status { font-size: 16px; color: #FFFFFF; padding: 12px; background: #222; min-height: 25px; font-weight: bold; }
        .loading-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="status">博瀚 AI 辨識初始化...</div>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <div class="ui">
        <button class="btn on" onclick="handleAction('上班')">上班打卡</button>
        <button class="btn off" onclick="handleAction('下班')">下班打卡</button>
        <button class="btn reg" onclick="startRegister()">管理模式 (快速註冊)</button>
    </div>
    <div id="mask" class="loading-mask">
        <div style="font-size: 20px; font-weight: bold;">處理中...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzvLPrTwyu0Z4v7aBp2A7VAjRYr3oCeiJEnN9vyibUGhXczqceY-fgVQ2aY2pTw-QM5qA/exec"; 
        const SCHOOL_LOC = { lat: 22.60600592058107, lng: 120.33630488747696 }; 
        
        let faceMatcher = null; 
        let isEngineReady = false;
        let currentDetectedName = "未知";
        let currentDescriptor = null;

        async function init() {
            const statusEl = document.getElementById('status');
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
                statusEl.innerText = "模型載入中...";
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                await syncKnownFaces();
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    isEngineReady = true; 
                    statusEl.innerText = "辨識引擎就緒";
                    startDetectionLoop();
                };
            } catch (err) { statusEl.innerText = "啟動出錯: " + err.message; }
        }

        async function syncKnownFaces() {
            try { 
                const resp = await fetch(API_URL);
                const rawData = await resp.json();
                if (!rawData || rawData.length === 0) return;
                const nameMap = {};
                rawData.forEach(u => {
                    if (!nameMap[u.name]) nameMap[u.name] = [];
                    nameMap[u.name].push(new Float32Array(u.features));
                });
                const labeledDescriptors = Object.keys(nameMap).map(name => new faceapi.LabeledFaceDescriptors(name, nameMap[name]));
                faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.5); 
            } catch(e) { console.error("同步失敗"); }
        }

        function startDetectionLoop() {
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            const statusEl = document.getElementById('status');
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(overlay, displaySize);

            setInterval(async () => {
                if (!isEngineReady) return;
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                
                if (resized.length > 0) {
                    const d = resized[0];
                    currentDescriptor = d.descriptor;
                    if (faceMatcher) {
                        const match = faceMatcher.findBestMatch(d.descriptor);
                        currentDetectedName = (match.label === "unknown") ? "未知" : match.label;
                    }
                    statusEl.innerText = "辨識中：" + currentDetectedName;
                    const box = d.detection.box;
                    ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 4;
                    ctx.strokeRect(box.x, box.y, box.width, box.height);
                    ctx.save(); ctx.scale(-1, 1);
                    ctx.font = "bold 24px 微軟正黑體"; ctx.fillStyle = "#FFFFFF";
                    ctx.fillText(currentDetectedName, -(box.x + box.width), box.y - 10);
                    ctx.restore();
                } else {
                    currentDetectedName = "未知";
                    currentDescriptor = null;
                    statusEl.innerText = "請對準鏡頭";
                }
            }, 300);
        }

        // [功能新增] 明確顯示上班或下班成功的對話框
        async function handleAction(act) {
            if (currentDetectedName === "未知") { alert("請先認出姓名再打卡"); return; }
            document.getElementById('mask').style.display = "flex";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ 
                            type: "CHECKIN", name: currentDetectedName, action: act,
                            lat: pos.coords.latitude, lng: pos.coords.longitude
                        }) 
                    });
                    const msg = await res.text();
                    
                    // 這裡修改提示訊息，明確帶入「上班」或「下班」
                    if (msg === "SUCCESS") {
                        alert(`✅ ${currentDetectedName} 老師\n${act}打卡成功！`);
                    } else {
                        alert(`❌ 打卡失敗：\n${msg}`);
                    }
                } catch(e) { alert("連線錯誤，請檢查網路"); }
                document.getElementById('mask').style.display = "none";
            }, () => { alert("請開啟手機定位功能"); document.getElementById('mask').style.display = "none"; }, { enableHighAccuracy: true });
        }

        async function startRegister() {
            const pw = prompt("管理密碼：");
            if (pw !== "0000") return;
            const name = prompt("註冊姓名：");
            if (!name) return;
            document.getElementById('mask').style.display = "flex";
            let successCount = 0;
            for(let i = 1; i <= 10; i++) {
                document.getElementById('status').innerText = `正在錄製第 ${i} 組特徵...`;
                await new Promise(r => setTimeout(r, 500));
                if(currentDescriptor) {
                    await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ type: "REGISTER", name: name, features: Array.from(currentDescriptor) }) 
                    });
                    successCount++;
                }
            }
            alert(`註冊成功！共錄得 ${successCount} 組特徵。`);
            location.reload();
        }
        window.onload = init;
    </script>
</body>
</html>

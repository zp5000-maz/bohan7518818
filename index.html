<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚 AI 打卡系統</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: "微軟正黑體", sans-serif; text-align: center; }
        #container { position: relative; width: 100vw; height: 70vh; background: #111; }
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ui { padding: 20px; }
        .btn { padding: 15px 25px; font-size: 18px; border-radius: 10px; border: none; margin: 5px; font-weight: bold; }
        .on { background: #4CAF50; color: white; }
        .off { background: #F44336; color: white; }
        .reg { background: #2196F3; color: white; }
        #status { font-size: 20px; color: #0f0; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="status">正在加載 AI 引擎...</div>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>
    <div class="ui">
        <button class="btn on" onclick="handleAction('上班')">上班打卡</button>
        <button class="btn off" onclick="handleAction('下班')">下班打卡</button>
        <br>
        <button class="btn reg" onclick="startRegister()">👤 註冊新老師</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz0RUAu2aAoSlz7dWlPylYDBp59MW7-0nj9XCOW5Ensllp-lVRg0G14ZrN67zMiKWzA7A/exec"; // <--- 請換成您的 GAS 網址
        let knownFaces = [];
        let isEngineReady = false;

        async function init() {
            const status = document.getElementById('status');
            // 1. 下載模型 (從網路載入)
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            
            status.innerText = "正在同步雲端名單...";
            // 2. 從 Google 下載已知老師特徵
            try {
                const resp = await fetch(API_URL);
                knownFaces = await resp.json();
            } catch(e) { console.log("目前無資料"); }

            // 3. 啟動鏡頭
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            
            isEngineReady = true;
            status.innerText = "博瀚 AI 系統就緒";
            processFrame();
        }

        async function processFrame() {
            if(!isEngineReady) return;
            const video = document.getElementById('video');
            const overlay = document.getElementById('overlay');
            const displaySize = { width: video.videoWidth, height: video.videoHeight };
            faceapi.matchDimensions(overlay, displaySize);

            // 每秒辨識偵測
            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                resizedDetections.forEach(d => {
                    let name = "未知";
                    if (knownFaces.length > 0) {
                        const faceMatcher = new faceapi.FaceMatcher(
                            knownFaces.map(f => new faceapi.LabeledFaceDescriptors(f.name, [new Float32Array(f.features)])), 
                            0.5
                        );
                        const bestMatch = faceMatcher.findBestMatch(d.descriptor);
                        name = bestMatch.toString().split(' ')[0];
                    }
                    const drawBox = new faceapi.draw.DrawBox(d.detection.box, { label: name });
                    drawBox.draw(overlay);
                    window.currentFace = { name, descriptor: d.descriptor };
                });
            }, 200);
        }

        async function handleAction(act) {
            if(!window.currentFace || window.currentFace.name === "未知") {
                alert("辨識不到老師，請對準鏡頭！");
                return;
            }
            const name = window.currentFace.name;
            document.getElementById('status').innerText = `傳送中... ${name} ${act}`;
            
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ type: "CHECKIN", name: name, action: act })
            });
            alert(`${name} 老師，${act}打卡成功！`);
            document.getElementById('status').innerText = "博瀚 AI 系統就緒";
        }

        async function startRegister() {
            const name = prompt("請輸入新老師姓名：");
            if (!name) return;
            if (!window.currentFace) { alert("請對準人臉後再按註冊！"); return; }
            
            document.getElementById('status').innerText = "註冊資料上傳中...";
            const features = Array.from(window.currentFace.descriptor);
            
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ type: "REGISTER", name: name, features: features })
            });
            
            alert(`註冊成功！系統將重新載入。`);
            location.reload();
        }

        init();
    </script>
</body>
</html>

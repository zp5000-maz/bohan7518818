<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>博瀚文理 - AI 辨識系統</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    #video-box { position: relative; border: 10px solid #34495e; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    video { width: 640px; height: 480px; transform: scaleX(-1); background: #000; }
    canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
    #status { margin-top: 20px; font-size: 24px; font-weight: bold; min-height: 40px; }
    #btn-group { display: none; gap: 20px; margin-top: 20px; }
    .btn { padding: 15px 50px; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-on { background: #27ae60; color: white; }
    .btn-off { background: #e74c3c; color: white; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <h1>博瀚文理 AI 考勤</h1>
  <div id="video-box">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>
  <div id="status">模型讀取中...</div>
  <div id="btn-group">
    <button class="btn btn-on" onclick="handlePunch('上班')">上班</button>
    <button class="btn btn-off" onclick="handlePunch('下班')">下班</button>
  </div>

  <script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const btnGroup = document.getElementById('btn-group');
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxDU76O8sB-PqxL64CHxbDBwvHi4Kyf9mu1qlp0_Mdk5DYHKhb5tFN9raVs5NqV6uz47w/exec'; 
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    let faceMatcher = null, currentTeacher = "", isBusy = false;

    async function init() {
      try {
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.load(MODEL_URL), // 筆電建議用高精度模型
          faceapi.nets.faceLandmark68Net.load(MODEL_URL),
          faceapi.nets.faceRecognitionNet.load(MODEL_URL)
        ]);
        const res = await fetch(GAS_URL);
        const data = await res.json();
        const labeled = data.map(m => new faceapi.LabeledFaceDescriptors(m.name, [new Float32Array(m.descriptor)]));
        faceMatcher = new faceapi.FaceMatcher(labeled, 0.6); // 筆電可以更精確
        const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
        video.srcObject = stream;
        status.innerText = '請正對鏡頭';
        detect();
      } catch (e) { status.innerText = '初始化失敗，請檢查名單與權限'; }
    }

    async function detect() {
      if (isBusy) return;
      // 筆電效能好，改用高精度偵測器
      const dec = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      if (dec && faceMatcher) {
        const match = faceMatcher.findBestMatch(dec.descriptor);
        if (match.label !== 'unknown') {
          currentTeacher = match.label;
          status.innerText = '老師您好：' + currentTeacher;
          status.style.color = "#2ecc71";
          btnGroup.style.display = 'flex';
          isBusy = true;
          return;
        }
      }
      setTimeout(detect, 200);
    }

    async function handlePunch(type) {
      status.innerText = '正在紀錄...';
      btnGroup.style.display = 'none';
      await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "checkin", name: currentTeacher, type: type }) });
      status.innerText = currentTeacher + ' ' + type + '成功！';
      setTimeout(() => { 
        status.innerText = '請正對鏡頭'; 
        status.style.color = "white";
        isBusy = false; 
        detect(); 
      }, 3000);
    }
    init();
  </script>
</body>
</html>

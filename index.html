<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>博瀚考勤系統 - 診斷版</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        #video-container { position: relative; display: inline-block; }
        video { width: 640px; height: 480px; background: #000; transform: scaleX(-1); }
        #status { font-size: 24px; color: #00ff00; margin: 20px; }
        #debug-info { color: #ff9900; font-family: monospace; }
        #btn-group { display: none; margin-top: 20px; }
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; margin: 10px; border-radius: 10px; border: none; }
        .btn-on { background: #28a745; color: white; }
        .btn-off { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <h2>博瀚 AI 考勤主機</h2>
    <div id="debug-info">系統檢查中...</div>
    <div id="video-container">
        <video id="video" autoplay muted playsinline></video>
    </div>
    <div id="status">初始化中...</div>
    <div id="btn-group">
        <button class="btn btn-on" onclick="punch('上班')">上班</button>
        <button class="btn btn-off" onclick="punch('下班')">下班</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const debug = document.getElementById('debug-info');
        const btnGroup = document.getElementById('btn-group');
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyTYNYK2E5QmeHQBErQf7w7b9nQSJ-of5ucWmF4JB5X_bQRENah5L2YYvgovfywGqBrDw/exec';
        let faceMatcher = null;
        let isBusy = false;
        let currentTeacher = "";

        async function init() {
            try {
                debug.innerText = "正在載入 AI 模型...";
                await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                
                debug.innerText = "正在讀取名單數據...";
                const res = await fetch(GAS_URL);
                const data = await res.json();
                
                if (data.length === 0) {
                    status.innerText = "警告：資料庫無名單！請先註冊。";
                    return;
                }

                const labeled = data.map(m => {
                    return new faceapi.LabeledFaceDescriptors(m.name, [new Float32Array(Object.values(m.descriptor))]);
                });
                
                // 門檻調寬至 0.65，增加容錯率
                faceMatcher = new faceapi.FaceMatcher(labeled, 0.65);
                debug.innerText = `已載入 ${data.length} 位老師名單`;

                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                status.innerText = "請正對鏡頭";
                detect();
            } catch (err) {
                debug.innerText = "錯誤: " + err.message;
            }
        }

        async function detect() {
            if (isBusy) return;
            
            const result = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            
            if (result) {
                const match = faceMatcher.findBestMatch(result.descriptor);
                debug.innerText = `偵測中... 最接近：${match.label} (誤差值: ${match.distance.toFixed(2)})`;
                
                if (match.label !== 'unknown') {
                    currentTeacher = match.label;
                    status.innerText = "老師您好：" + currentTeacher;
                    btnGroup.style.display = 'block';
                    isBusy = true;
                    return;
                }
            } else {
                debug.innerText = "鏡頭內沒看到人臉...";
            }
            setTimeout(detect, 200);
        }

        async function punch(type) {
            status.innerText = "紀錄傳送中...";
            btnGroup.style.display = 'none';
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "checkin", name: currentTeacher, type: type }) });
            status.innerText = "打卡成功！";
            setTimeout(() => { isBusy = false; status.innerText = "請正對鏡頭"; detect(); }, 3000);
        }

        init();
    </script>
</body>
</html>

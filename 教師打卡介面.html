<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博瀚文理 - AI 人臉辨識系統</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background-color: #1a1a1a; color: #ffeb3b; padding: 20px; }
        #鏡頭區域 { position: relative; display: inline-block; width: 100%; max-width: 500px; border: 3px solid #ffeb3b; border-radius: 15px; overflow: hidden; }
        video { width: 100%; display: block; }
        canvas { position: absolute; top: 0; left: 0; }
        .按鈕區 { margin-top: 25px; }
        button { padding: 15px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; margin: 10px; transition: 0.3s; }
        #上班 { background-color: #4caf50; color: white; }
        #下班 { background-color: #f44336; color: white; }
        #狀態顯示 { margin-top: 20px; font-size: 1.2em; color: #ffffff; }
    </style>
</head>
<body>

    <h1>博瀚文理補習班</h1>
    <div id="狀態顯示">系統初始化中，請稍候...</div>

    <div id="鏡頭區域">
        <video id="鏡頭畫面" autoplay muted playsinline></video>
    </div>

    <div class="按鈕區">
        <button id="上班">老師上班</button>
        <button id="下班">老師下班</button>
    </div>

    <script>
        const 影片 = document.getElementById('鏡頭畫面');
        const 顯示欄 = document.getElementById('狀態顯示');
        const 後台網址 = 'https://script.google.com/macros/s/AKfycbx9BErtqeWYNRAKldSwTUE973D3IfQk9Bza-ehY8Glll19hfDfoyUMtFkKd7KynDloj/exec'; // 第一階段產生的 URL
        
        // 設定老師資料庫 (照片網址請使用轉換後的格式)
        const 教師名單 = [
            { 姓名: '林博瀚', 照片網址: 'https://lh3.googleusercontent.com/d/1yHwrJaSky8fRL8tiDoKvbfGDWUWGlkGT'},
             
        ];

        let 臉部比對器;

        // 1. 初始化 AI 模型並載入老師照片
        async function 初始化系統() {
            顯示欄.innerText = "正在載入 AI 模型...";
            await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');

            顯示欄.innerText = "正在讀取雲端教師照片...";
            const 標記特徵 = await Promise.all(
                教師名單.map(async 教師 => {
                    const 圖片網址 = `https://lh3.googleusercontent.com/d/${教師.ID}`;
                    const 圖片 = await faceapi.fetchImage(圖片網址);
                    const 特徵值 = await faceapi.detectSingleFace(圖片).withFaceLandmarks().withFaceDescriptor();
                    return new faceapi.LabeledFaceDescriptors(教師.姓名, [特徵值.descriptor]);
                })
            );
            
            臉部比對器 = new faceapi.FaceMatcher(標記特徵, 0.6); // 0.6 是嚴格度
            啟動鏡頭();
        }

        // 2. 啟動 iPhone 8 鏡頭
        async function 啟動鏡頭() {
            const 串流 = await navigator.mediaDevices.getUserMedia({ video: {} });
            影片.srcObject = 串流;
            顯示欄.innerText = "系統已就緒，請對準鏡頭打卡";
        }

        // 3. 執行辨識與傳送資料
        async function 進行打卡(動作) {
            const 偵測 = await faceapi.detectSingleFace(影片).withFaceLandmarks().withFaceDescriptor();
            
            if (!偵測) {
                alert("找不到臉孔，請靠近一點再試一次");
                return;
            }

            const 比對結果 = 臉部比對器.findBestMatch(偵測.descriptor);
            if (比對結果.label === 'unknown') {
                alert("辨識失敗：非本校教師");
                return;
            }

            顯示欄.innerText = `辨識成功：${比對結果.label} 老師，傳送中...`;

            fetch(後台網址, {
                method: 'POST',
                mode: 'no-cors', // 解決跨網域問題
                body: JSON.stringify({
                    name: 比對結果.label,
                    action: 動作,
                    confidence: (比對結果.distance * 100).toFixed(1) + "%"
                })
            }).then(() => {
                alert(`${比對結果.label} 老師 ${動作} 成功！`);
                顯示欄.innerText = "打卡完成，請下一位準備";
            });
        }

        document.getElementById('上班').addEventListener('click', () => 進行打卡('上班'));
        document.getElementById('下班').addEventListener('click', () => 進行打卡('下班'));

        初始化系統();
    </script>
</body>
</html>

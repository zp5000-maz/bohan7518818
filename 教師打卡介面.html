<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>博瀚文理 - AI 人臉辨識考勤系統</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background-color: #1a1a1a; color: #ffffff; padding: 20px; margin: 0; }
        .標題 { color: #ffc107; margin-bottom: 5px; }
        #鏡頭容器 { position: relative; display: inline-block; width: 100%; max-width: 480px; margin-top: 10px; }
        video { width: 100%; border-radius: 15px; border: 3px solid #ffc107; background-color: #000; transform: rotateY(180deg); }
        canvas { position: absolute; top: 0; left: 0; transform: rotateY(180deg); }
        .按鈕區塊 { margin-top: 25px; display: flex; justify-content: center; gap: 20px; }
        button { padding: 15px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; transition: 0.3s; }
        #上班按鈕 { background-color: #28a745; color: white; }
        #下班按鈕 { background-color: #dc3545; color: white; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        #狀態顯示 { margin-top: 20px; font-size: 16px; color: #00d4ff; min-height: 1.5em; }
        .載入遮罩 { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="載入畫面" class="載入遮罩">系統啟動中，請稍候...</div>

    <h2 class="標題">博瀚文理補習班</h2>
    <div id="狀態顯示">初始化中...</div>

    <div id="鏡頭容器">
        <video id="影像畫面" autoplay muted playsinline></video>
    </div>

    <div class="按鈕區塊">
        <button id="上班按鈕">上班打卡</button>
        <button id="下班按鈕">下班打卡</button>
    </div>

    <script>
        const 影片 = document.getElementById('影像畫面');
        const 狀態列 = document.getElementById('狀態顯示');
        const 載入遮罩 = document.getElementById('載入畫面');
        
        // ---------------------------------------------------------
        // 重要設定區
        // ---------------------------------------------------------
        const 後台網址 = 'https://script.google.com/macros/s/AKfycbx9BErtqeWYNRAKldSwTUE973D3IfQk9Bza-ehY8Glll19hfDfoyUMtFkKd7KynDloj/exec'; // <--- 請在此處貼上您的 GAS 部署網址
        
        const 教師資料庫 = [
            { 姓名: "曾益慧", 照片: "https://your-domain.com/tseng.jpg" }, // 請替換成實際照片網址
            { 姓名: "老師B", 照片: "https://your-domain.com/teacher_b.jpg" }
        ];
        // ---------------------------------------------------------

        let 臉部比對器;

        // 啟動流程
        async function 啟動系統() {
            try {
                // 1. 載入模型
                const 模型路徑 = 'https://justadudewhohacks.github.io/face-api.js/models';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(模型路徑);
                await faceapi.nets.faceLandmark68Net.loadFromUri(模型路徑);
                await faceapi.nets.faceRecognitionNet.loadFromUri(模型路徑);
                
                // 2. 建立辨識庫
                臉部比對器 = await 訓練辨識器();
                
                // 3. 開啟鏡頭
                const 串流 = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                影片.srcObject = 串流;
                
                載入遮罩.style.display = 'none';
                狀態列.innerText = "請對準鏡頭並點擊打卡";
            } catch (err) {
                console.error(err);
                狀態列.innerText = "系統啟動失敗，請檢查鏡頭權限或網路";
                alert("啟動錯誤: " + err);
            }
        }

        async function 訓練辨識器() {
            return Promise.all(
                教師資料庫.map(async 教師 => {
                    const 影像 = await faceapi.fetchImage(教師.照片);
                    const 描述符 = await faceapi.detectSingleFace(影像).withFaceLandmarks().withFaceDescriptor();
                    if (!描述符) throw new Error(`無法讀取 ${教師.姓名} 的預存特徵`);
                    return new faceapi.LabeledFaceDescriptors(教師.姓名, [描述符.descriptor]);
                })
            ).then(標記特徵 => new faceapi.FaceMatcher(標記特徵, 0.5)); // 0.5 為嚴格度
        }

        async function 處理打卡(動作) {
            if (!臉部比對器) return;

            狀態列.innerText = "正在辨識臉部特徵...";
            const 現場偵測 = await faceapi.detectSingleFace(影片).withFaceLandmarks().withFaceDescriptor();

            if (!現場偵測) {
                alert("偵測不到臉部，請保持臉部清晰並對準鏡頭");
                狀態列.innerText = "辨識失敗，請重試";
                return;
            }

            const 比對結果 = 臉部比對器.findBestMatch(現場偵測.descriptor);
            
            if (比對結果.label === 'unknown') {
                alert("辨識失敗：系統不認識此面孔");
                狀態列.innerText = "非登記教師";
                return;
            }

            const 姓名 = 比對結果.label;
            const 信心指數 = ((1 - 比對結果.distance) * 100).toFixed(1) + "%";
            
            狀態列.innerText = `辨識成功：${姓名}，正在傳送紀錄...`;

            // 傳送數據至 GAS
            fetch(後台網址, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    name: 姓名,
                    action: 動作,
                    confidence: 信心指數
                })
            }).then(() => {
                // 注意：GAS no-cors 模式下不會回傳內容，改以提示確認
                alert(`【打卡送出】\n姓名：${姓名}\n動作：${動作}\n\n提醒：若已上班超過8小時，紀錄將被攔截，請聯繫後台。`);
                狀態列.innerText = "打卡完成";
            }).catch(err => {
                alert("網路連線錯誤，請檢查 Wi-Fi");
            });
        }

        document.getElementById('上班按鈕').onclick = () => 處理打卡('上班');
        document.getElementById('下班按鈕').onclick = () => 處理打卡('下班');

        // 執行系統
        啟動系統();
    </script>
</body>
</html>

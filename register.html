<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>老師註冊</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif; padding: 20px;">
  <h2>老師臉部註冊</h2>
  <video id="video" autoplay muted playsinline style="width: 100%; max-width: 400px; border-radius: 10px;"></video><br>
  <input type="text" id="name" placeholder="請輸入姓名" style="padding: 10px; margin: 10px; width: 200px;"><br>
  <button onclick="reg()" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px;">擷取並註冊</button>
  <p id="msg">載入中...</p>
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwcjePZkyD7vKeUrooJgpatsOLojfe6ISRO99JpCg8QLH2P5Y08g4LhPikrHg1Z_sRAYw/exec';
    async function init() {
      const url = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
      await faceapi.nets.tinyFaceDetector.load(url);
      await faceapi.nets.faceLandmark68Net.load(url);
      await faceapi.nets.faceRecognitionNet.load(url);
      const s = await navigator.mediaDevices.getUserMedia({ video: {} });
      document.getElementById('video').srcObject = s;
      document.getElementById('msg').innerText = '系統就緒';
    }
    async function reg() {
      const n = document.getElementById('name').value;
      if (!n) return alert("請輸入姓名");
      const d = await faceapi.detectSingleFace(document.getElementById('video'), new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
      if (!d) return alert("找不到臉");
      fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "register", name: n, descriptor: Array.from(d.descriptor) }) });
      document.getElementById('msg').innerText = n + ' 已送出註冊';
    }
    init();
  </script>
</body>
</html>
